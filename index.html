<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f8f9fa, #e9ecef);
        }

        .navbar {
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        .hero {
            margin-top: 100px;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: bold;
            color: #343a40;
        }

        .hero p {
            font-size: 1.2rem;
            color: #6c757d;
        }

        .btn-custom {
            padding: 10px 25px;
            font-size: 18px;
            border-radius: 30px;
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">My Website</a>
            <div>
                <a href="index.html" class="btn btn-outline-light btn-sm">Home</a>
                <a href="register.html" class="btn btn-outline-light btn-sm">Register</a>
                <a href="login.html" class="btn btn-outline-light btn-sm">Login</a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="container text-center hero">
        <h1>Welcome to My Website</h1>
        <p>This is a simple Bootstrap homepage with custom styling.</p>
        <a href="register.html" class="btn btn-primary btn-custom">Get Started</a>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3">
        <p>&copy; 2026 My Website | All Rights Reserved</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
